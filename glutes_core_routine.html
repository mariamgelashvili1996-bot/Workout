const SK="gcr-log-v1",CHK="gcr-chk-v1";
function loadLog(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function saveLog(l){try{localStorage.setItem(SK,JSON.stringify(l))}catch{}}
function loadChecks(){try{return JSON.parse(localStorage.getItem(CHK))||{}}catch{return{}}}
function saveChecks(c){try{localStorage.setItem(CHK,JSON.stringify(c))}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0]}
function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")}
function round25(v){return Math.round(v/2.5)*2.5}
function exType(ex){return ex.type||"weighted"}
function isLogged(entry,ex){if(!entry)return false;const t=exType(ex);if(t==="timed")return entry.duration>0||entry.duration_s1>0;if(t==="repOnly")return entry.reps>0;return entry.weight>0&&entry.reps>0}

function getHistory(dayId,exId,max){const log=loadLog(),r=[],sfx="_"+dayId+"_"+exId;Object.keys(log).filter(k=>k.endsWith(sfx)).sort().reverse().forEach(k=>{if(r.length<(max||6))r.push({date:k.split("_")[0],...log[k]})});return r}
function getLastSession(dayId,exId){const log=loadLog(),tk=todayStr(),sfx="_"+dayId+"_"+exId;const k=Object.keys(log).filter(k=>k.endsWith(sfx)&&!k.startsWith(tk)).sort().reverse()[0];return k?{date:k.split("_")[0],...log[k]}:null}

function playBeep(){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const beeps=[[880,150],[0,80],[880,150],[0,80],[1100,200]];let t=ac.currentTime;beeps.forEach(([freq,dur])=>{if(freq>0){const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=freq;o.type="sine";g.gain.value=0.25;o.start(t);o.stop(t+dur/1000)}t+=dur/1000});setTimeout(()=>ac.close(),1500)}catch{}}
let wl=null;async function reqWL(){try{if("wakeLock"in navigator)wl=await navigator.wakeLock.request("screen")}catch{}}function relWL(){try{wl&&wl.release();wl=null}catch{}}

// MINI TIMER
// ══════════════════════════════════════════
function MiniTimer({seconds,sides,color,onDone}){
  const c=CL[color];
  const twoPhase=sides===2;
  const[phase,setPhase]=useState(0);
  const[rem,setRem]=useState(seconds);
  const iv=useRef(null);
  const vib=p=>{try{navigator.vibrate(p)}catch{};playBeep()};

  useEffect(()=>{
    if((phase===1||phase===3)&&rem>0){
      iv.current=setInterval(()=>setRem(p=>{
        if(p<=1){clearInterval(iv.current);vib([200,100,200]);
          if(phase===1&&twoPhase){setPhase(2);return 0}
          setPhase(4);if(onDone)onDone();return 0;}return p-1;}),1000);}
    return()=>clearInterval(iv.current);
  },[phase,rem]);

  const start=()=>{setRem(seconds);setPhase(1)};
  const startSide2=()=>{setRem(seconds);setPhase(3)};

  if(phase===0)return h("button",{onClick:start,style:{background:c.bg,border:"1px solid "+c.d,borderRadius:6,color:c.a,padding:"4px 10px",fontSize:11,fontWeight:800,marginTop:4}},
    "\u23F1 "+fmtTime(seconds)+(twoPhase?" (each)":""));

  if(phase===2)return h("div",{style:{marginTop:4,padding:"8px 12px",background:"#1a1008",border:"1px solid #F0C060",borderRadius:8,textAlign:"center",animation:"switchPulse 1.5s infinite"}},
    h("div",{style:{fontSize:14,fontWeight:900,color:"#F0C060"}},"\u21C4 SWITCH SIDES"),
    h("button",{onClick:startSide2,style:{marginTop:6,background:"#F0C060",borderRadius:6,color:"#000",padding:"6px 20px",fontSize:13,fontWeight:800}},"Start side 2"));

  if(phase===4)return h("div",{onClick:()=>{setPhase(0);setRem(seconds)},style:{marginTop:4,fontSize:12,color:c.a,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}},"\u2714 Done"+(twoPhase?" (both sides)":""),h("span",{style:{fontSize:10,color:"#3A3A3A",fontWeight:600}},"\u21BB"));

  return h("div",{style:{marginTop:4,display:"flex",alignItems:"center",gap:8}},
    h("span",{style:{fontSize:16,fontWeight:900,color:rem<=5?"#E891B1":"#F5F0F8",fontVariantNumeric:"tabular-nums",animation:rem<=5?"timerPulse 1s infinite":"none",minWidth:40}},fmtTime(rem)),
    twoPhase&&h("span",{style:{fontSize:10,color:"#777",fontWeight:700}},phase===1?"Side 1":"Side 2"),
    h("button",{onClick:()=>{clearInterval(iv.current);if(phase===1&&twoPhase){setPhase(2);setRem(0)}else{setPhase(4);if(onDone)onDone()}},style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:6,color:"#888",padding:"3px 10px",fontSize:11,fontWeight:700}},"Skip"));
}

// ── TAPPABLE VALUE ──
function TapVal({value,unit,field,onSet,color}){
  const[ed,setEd]=useState(false);const[draft,setDraft]=useState("");const inp=useRef(null);const c=CL[color];
  useEffect(()=>{if(ed&&inp.current){inp.current.focus();inp.current.select()}},[ed]);

  const rm=i=>{removeProteinEntry(i);setVer(v=>v+1)};
  const addCustom=()=>{const v=parseFloat(custom);if(!isNaN(v)&&v>0){add(v);setCustom("")}};
  const saveWeight=()=>{const v=parseFloat(wDraft);if(!isNaN(v)&&v>0){const w=loadWeights();w[tk]=v;saveWeights(w);setWEdit(false);setVer(x=>x+1)}};
  const todayWeight=loadWeights()[tk];
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];days.push({date:ds,label:i===0?"Today":d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric"}),total:getProteinTotal(ds)})}
  const maxDay=Math.max(pr.target,...days.map(d=>d.total));
  return h("div",{style:{animation:"slideUp .15s ease",padding:"20px 0 12px"}},
    h("div",{style:{fontSize:11,fontWeight:800,letterSpacing:3,color:"#E891B1",borderBottom:"2px solid #9B4A6E",padding:"0 0 6px",marginBottom:12}},"BODYWEIGHT"),
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",marginBottom:8}},
      h("div",{style:{display:"flex",alignItems:"baseline",gap:6}},
        h("span",{style:{fontSize:28,fontWeight:900,color:"#F5F0F8",fontVariantNumeric:"tabular-nums"}},todayWeight||bw),
        h("span",{style:{fontSize:14,color:"#555",fontWeight:700}},"kg"),
        !todayWeight&&lw.date&&h("span",{style:{fontSize:10,color:"#555"}},"("+lw.date+")")),

        h("input",{type:"number",inputMode:"decimal",step:"0.1",value:wDraft,onChange:ev=>setWDraft(ev.target.value),onKeyDown:ev=>{if(ev.key==="Enter")saveWeight()},style:{width:64,padding:"6px 8px",borderRadius:8,background:"#141414",border:"1px solid #E891B1",color:"#F5F0F8",fontSize:14,fontWeight:700,outline:"none",textAlign:"center",fontFamily:"inherit"}}),
        h("button",{onClick:saveWeight,style:{padding:"6px 12px",borderRadius:8,background:"#E891B1",color:"#000",fontSize:12,fontWeight:800}},"Save"))
      :h("button",{onClick:()=>{setWDraft(todayWeight?String(todayWeight):String(bw));setWEdit(true)},style:{padding:"6px 14px",borderRadius:8,background:"#141414",border:"1px solid #222",color:"#888",fontSize:12,fontWeight:700}},todayWeight?"Update":"Log today")),
    h("div",{style:{fontSize:11,fontWeight:800,letterSpacing:3,color:"#E891B1",borderBottom:"2px solid #9B4A6E",padding:"18px 0 6px",marginBottom:16}},"DAILY PROTEIN"),
    h("div",{style:{textAlign:"center",marginBottom:20}},
      h("div",{style:{fontSize:48,fontWeight:900,color:over?"#6EDBA8":hit?"#F0C060":"#F5F0F8",marginTop:4,fontVariantNumeric:"tabular-nums"}},total+"g"),
      h("div",{style:{fontSize:13,color:"#666",marginTop:2}},"Target: "+pr.target+"g (range: "+pr.lo+"\u2013"+pr.hi+"g) · "+bw+"kg")),
    h("div",{style:{margin:"0 0 24px",padding:"0 4px"}},
      h("div",{style:{height:8,background:"#1a1a1a",borderRadius:4,position:"relative",overflow:"hidden"}},
        h("div",{style:{height:"100%",borderRadius:4,background:over?"#6EDBA8":hit?"#F0C060":"#E891B1",width:pct+"%",transition:"width .4s",boxShadow:pct>0?"0 0 8px "+(over?"rgba(110,219,168,.4)":"rgba(232,145,177,.3)"):"none"}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4}},
        h("span",{style:{fontSize:10,color:"#555"}},"0g"),
        h("span",{style:{fontSize:10,color:"#555"}},pr.target+"g target"))),
    h("div",{style:{fontSize:11,fontWeight:800,letterSpacing:3,color:"#E891B1",borderBottom:"2px solid #9B4A6E",padding:"0 0 6px",marginBottom:12}},"QUICK ADD"),
    h("div",{style:{display:"flex",gap:8,marginBottom:12}},
      [15,20,25,30].map(g=>h("button",{key:g,onClick:()=>add(g),style:{flex:1,padding:"12px 0",borderRadius:10,background:"#141414",border:"1px solid #222",color:"#F5F0F8",fontSize:15,fontWeight:800,minHeight:44}},"+"+g+"g"))),
    h("div",{style:{display:"flex",gap:8,marginBottom:20}},
      h("input",{ref:inp,type:"number",inputMode:"decimal",placeholder:"Custom g",value:custom,onChange:ev=>setCustom(ev.target.value),onKeyDown:ev=>{if(ev.key==="Enter")addCustom()},style:{flex:1,padding:"10px 14px",borderRadius:10,background:"#141414",border:"1px solid #222",color:"#F5F0F8",fontSize:14,fontWeight:700,outline:"none",fontFamily:"inherit"}}),
      h("button",{onClick:addCustom,style:{padding:"10px 20px",borderRadius:10,background:"#E891B1",color:"#000",fontSize:14,fontWeight:800,minHeight:44}},"ADD")),
    entries.length>0&&h("div",null,
      h("div",{style:{fontSize:11,fontWeight:800,letterSpacing:3,color:"#E891B1",borderBottom:"2px solid #9B4A6E",padding:"0 0 6px",marginBottom:10}},"TODAY"),
      entries.map((e,i)=>h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #141414"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          h("span",{style:{fontSize:16,fontWeight:800,color:"#F5F0F8"}},e.g+"g"),
          h("span",{style:{fontSize:12,color:"#555"}},e.t)),
        h("button",{onClick:()=>rm(i),style:{background:"none",color:"#555",fontSize:12,fontWeight:700,padding:"4px 8px"}},"\u2715")))),
    h("div",{style:{marginTop:24}},
      h("div",{style:{fontSize:11,fontWeight:800,letterSpacing:3,color:"#E891B1",borderBottom:"2px solid #9B4A6E",padding:"0 0 6px",marginBottom:12}},"LAST 7 DAYS"),
      days.map((d,i)=>{const dpct=maxDay>0?(d.total/maxDay)*100:0;const isToday=d.date===tk;
        return h("div",{key:d.date,style:{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}},
          h("span",{style:{fontSize:12,fontWeight:isToday?800:600,color:isToday?"#F5F0F8":"#666",minWidth:50}},d.label),
          h("div",{style:{flex:1,height:6,background:"#1a1a1a",borderRadius:3}},
            h("div",{style:{height:"100%",borderRadius:3,background:d.total>=pr.lo?"#6EDBA8":d.total>0?"#E891B1":"transparent",width:dpct+"%",transition:"width .3s"}})),
          h("span",{style:{fontSize:12,fontWeight:700,color:d.total>=pr.lo?"#6EDBA8":d.total>0?"#888":"#333",minWidth:36,textAlign:"right"}},d.total>0?d.total+"g":"\u2014"));})));
}

function App(){

        h("div",{style:{display:"flex",gap:6}},
          view==="protein"||view==="info"
            ?h("button",{onClick:()=>setView("workout"),style:{background:"#161616",border:"1px solid #222",borderRadius:10,color:"#777",padding:"8px 12px",fontSize:12,fontWeight:700,letterSpacing:1}},"BACK")

              h("button",{onClick:()=>setView("info"),style:{background:"#161616",border:"1px solid #222",borderRadius:10,color:"#777",padding:"8px 12px",fontSize:12,fontWeight:700,letterSpacing:1}},"INFO")))),
      view==="workout"&&gymDay&&h("div",{style:{marginTop:12,marginBottom:4}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
          h("span",{style:{fontSize:11,color:"#666",fontWeight:700}},"SESSION PROGRESS"),
          h("span",{style:{fontSize:11,color:pct>=100?"#6EDBA8":c.d,fontWeight:800}},done+"/"+day.ex.length+(pct>=100?" \u2714":""))),
        h("div",{style:{height:3,background:"#1a1a1a",borderRadius:2}},h("div",{style:{height:"100%",borderRadius:2,background:pct>=100?"#6EDBA8":c.a,width:pct+"%",transition:"width .4s",boxShadow:pct>0?"0 0 8px "+(pct>=100?"rgba(110,219,168,.5)":"rgba(232,145,177,.4)"):"none"}}))),

          return h("button",{key:d.id,onClick:()=>setAd(i),style:{flex:1,minWidth:42,padding:"8px 2px",borderRadius:10,background:act?dc.bg:"transparent",border:act?"1.5px solid "+dc.d:"1.5px solid transparent",textAlign:"center",transition:"all .2s"}},
            h("div",{style:{fontSize:10,fontWeight:800,letterSpacing:1,color:act?dc.a:"#555"}},d.label),
            h("div",{style:{fontSize:9,fontWeight:700,color:act?"#999":"#555",marginTop:1}},d.type==="rest"?"\u2014":d.type==="nonGym"?"\u26ac":"\u25A0"))}))),
    h("div",{style:{padding:"0 16px"}},
